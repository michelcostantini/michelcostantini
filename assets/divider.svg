<svg width="100%" height="30" viewBox="0 0 900 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="50%" stop-color="#dd0b28" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4C4C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF003C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="14" width="900" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
  </rect>
</svg>
