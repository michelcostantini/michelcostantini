<svg width="100%" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowTS2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="450" y="52" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-weight="bold"
        font-size="38" letter-spacing="5" fill="#dd0b28" filter="url(#glowTS2)">
    &gt; Tech &amp; Skills_
    <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <rect x="375" y="66" width="150" height="2" fill="#dd0b28" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>